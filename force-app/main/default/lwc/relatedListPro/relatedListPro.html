<template>
    <!-- Config error: shown to admins when object/field properties are invalid -->
    <template if:true={configError}>
        <div class="slds-card_boundary">
            <lightning-card title={componentTitle} icon-name="utility:error">
                <div class="slds-p-around_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <lightning-icon
                            icon-name="utility:error"
                            alternative-text="Error"
                            size="x-small"
                            class="slds-m-right_x-small">
                        </lightning-icon>
                        <h2>{configError}</h2>
                    </div>
                </div>
            </lightning-card>
        </div>
    </template>

    <template if:false={configError}>
    <template if:false={hideComponent}>
        <div class="slds-card_boundary">
            <lightning-card title={componentTitle} icon-name={objectIconName}>
                <div slot="actions">
                    <div class="slds-grid slds-grid_align-spread slds-p-around_small">
                        <template if:true={hasAnyRecords}>
                            <div class="search-wrapper slds-m-right_x-small">
                                <lightning-input
                                    type="search"
                                    placeholder="Search..."
                                    value={searchTerm}
                                    onchange={handleSearch}
                                    variant="label-hidden">
                                </lightning-input>
                            </div>
                            <lightning-button-icon
                                icon-name="utility:refresh"
                                alternative-text="Refresh"
                                variant="border-filled"
                                onclick={loadRecords}
                                class="slds-m-right_x-small">
                            </lightning-button-icon>
                        </template>
                        <template if:true={isObjectCreatable}>
                            <lightning-button
                                label="New"
                                variant="neutral"
                                onclick={handleNew}>
                            </lightning-button>
                        </template>
                    </div>
                </div>

                <!-- Loading -->
                <template if:true={isLoading}>
                    <div class="slds-p-around_medium slds-text-align_center">
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </div>
                </template>

                <template if:false={isLoading}>

                    <template if:true={noSearchResults}>
                        <div class="slds-p-around_medium slds-text-align_center">
                            <p class="slds-text-color_weak">No results for &ldquo;{searchTerm}&rdquo;.</p>
                        </div>
                    </template>

                    <template if:true={hasDisplayRecords}>
                        <!-- Record info line -->
                        <div class="slds-text-body_small slds-text-color_weak slds-p-horizontal_medium slds-p-bottom_x-small">
                            <template if:true={searchTerm}>
                                {displayRecords.length} of {records.length} item{recordCountSuffix}
                            </template>
                            <template if:false={searchTerm}>
                                {records.length} item{recordCountSuffix}
                            </template>
                            <template if:true={isPro}> &bull; Sorted by {sortField}</template>
                        </div>
                        <div class="table-container">
                            <c-custom-datatable
                                key-field="Id"
                                data={displayRecords}
                                columns={columns}
                                draft-values={draftValues}
                                onsave={handleSave}
                                onsort={handleSort}
                                oncellchange={handleCellChange}
                                onlookupselect={handleLookupSelect}
                                onrowaction={handleRowAction}
                                inline-edit
                                hide-checkbox-column>
                            </c-custom-datatable>
                        </div>

                        <!-- Pagination (Pro only) -->
                        <template if:true={showPagination}>
                            <div class="slds-grid slds-grid_align-spread slds-p-around_small">
                                <lightning-button
                                    label="Previous"
                                    icon-name="utility:chevronleft"
                                    disabled={isPreviousDisabled}
                                    onclick={handlePrevious}>
                                </lightning-button>
                                <span class="slds-text-body_small slds-text-color_weak slds-align-middle">
                                    Page {pageNumber} of {totalPages}
                                </span>
                                <lightning-button
                                    label="Next"
                                    icon-name="utility:chevronright"
                                    icon-position="right"
                                    disabled={isNextDisabled}
                                    onclick={handleNext}>
                                </lightning-button>
                            </div>
                        </template>
                    </template>
                </template>

                <!-- View All footer -->
                <template if:true={hasAnyRecords}>
                    <div slot="footer">
                        <a onclick={handleViewAll} style="cursor:pointer;">View All</a>
                    </div>
                </template>

                <!-- Free tier CTA -->
                <template if:false={isPro}>
                    <template if:true={hasAnyRecords}>
                        <div class="cta-footer">
                            <div class="cta-content">
                                <img src={logoUrl} alt="LCzar Labs" class="brand-logo"/>
                                <div class="cta-divider"></div>
                                <p class="slds-text-body_small cta-message">
                                    Free tier &bull; Up to 10 records &bull; &nbsp;
                                    <a href="https://lczarlabs.gumroad.com" target="_blank" class="upgrade-link">Upgrade to Pro</a>
                                    &nbsp; for unlimited rows, sorting &amp; pagination
                                </p>
                            </div>
                        </div>
                    </template>
                </template>
            </lightning-card>
        </div>

        <!-- Delete confirmation modal -->
        <template if:true={showDeleteModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Confirm Delete</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Are you sure you want to delete this record? This action cannot be undone.</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button
                            label="Cancel"
                            variant="neutral"
                            onclick={handleDeleteCancel}>
                        </lightning-button>
                        <lightning-button
                            label="Delete"
                            variant="destructive"
                            onclick={handleDeleteConfirm}
                            class="slds-m-left_x-small">
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </template>
    </template> <!-- if:false={hideComponent} -->
    </template> <!-- if:false={configError} -->
